<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LOOP Topology Diagram</title>
  <desc id="desc">Clean system topology diagram for LOOP showing Node, Container, Floor, Lenny's Brain, Theo, relay, connectors, and ingestion flow.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .section { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 16px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #475569; }
      .node { fill: #e0f2fe; stroke: #0284c7; stroke-width: 3; rx: 18; ry: 18; }
      .container { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; rx: 18; ry: 18; }
      .brain { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 3; rx: 18; ry: 18; }
      .floor { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 18; ry: 18; }
      .input { fill: #f1f5f9; stroke: #64748b; stroke-width: 2.5; rx: 14; ry: 14; }
      .theo { fill: #f8fafc; stroke: #334155; stroke-width: 2.5; rx: 14; ry: 14; }
      .accent { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 2.5; rx: 14; ry: 14; }
      .arrow { stroke: #1e3a8a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .softarrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowSoft); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text class="title" x="80" y="70">LOOP — Live Overview of Open Projects</text>
  <text class="subtitle" x="80" y="102">Governed personal operations system for shared state, stable behavior, and real execution</text>

  <rect class="panel" x="60" y="150" width="300" height="610"/>
  <text class="section" x="90" y="195">Input + Capture</text>
  <rect class="input" x="90" y="230" width="240" height="88"/>
  <text class="label" x="110" y="265">Messy Real Input</text>
  <text class="small" x="110" y="292">notes, photos, emails, files</text>

  <rect class="input" x="90" y="350" width="240" height="96"/>
  <text class="label" x="110" y="385">Canonical Intake</text>
  <text class="small" x="110" y="412">YAML / packets / source refs</text>

  <rect class="input" x="90" y="478" width="240" height="96"/>
  <text class="label" x="110" y="513">Validation Gate</text>
  <text class="small" x="110" y="540">schema, dedupe, provisional, allow</text>

  <rect class="theo" x="90" y="615" width="240" height="105"/>
  <text class="label" x="110" y="650">Theo</text>
  <text class="small" x="110" y="677">strategy, critique, pressure-test</text>
  <text class="small" x="110" y="700">human-in-the-loop preference layer</text>

  <rect class="panel" x="410" y="150" width="760" height="610"/>
  <text class="section" x="440" y="195">Core LOOP Topology</text>

  <rect class="container" x="705" y="225" width="170" height="115"/>
  <text class="label" x="726" y="262">Lenny's</text>
  <text class="label" x="718" y="288">Container</text>
  <text class="small" x="727" y="316">doctrine, skills, rules</text>

  <rect class="brain" x="635" y="385" width="310" height="120"/>
  <text class="label" x="725" y="425">Lenny's Brain</text>
  <text class="small" x="663" y="452">planning, routing, synthesis,</text>
  <text class="small" x="676" y="476">controlled low-risk action</text>

  <rect class="node" x="485" y="565" width="610" height="125"/>
  <text class="label" x="740" y="606">The Node</text>
  <text class="small" x="598" y="634">shared coordination truth: projects, tasks, clients,</text>
  <text class="small" x="635" y="658">dashboards, handoffs, summaries, pointers</text>

  <rect class="floor" x="1210" y="150" width="330" height="610"/>
  <text class="section" x="1240" y="195">The Floor</text>
  <text class="small" x="1240" y="222">execution truth</text>

  <rect class="accent" x="1240" y="260" width="270" height="105"/>
  <text class="label" x="1340" y="302">Cowork</text>
  <text class="small" x="1270" y="330">desktop execution, staged work</text>

  <rect class="accent" x="1240" y="395" width="270" height="105"/>
  <text class="label" x="1325" y="437">Claude Code</text>
  <text class="small" x="1270" y="465">repos, scripts, automation, terminal</text>

  <rect class="accent" x="1240" y="530" width="270" height="150"/>
  <text class="label" x="1318" y="570">Artifacts</text>
  <text class="small" x="1270" y="598">files, reports, packets, manifests,</text>
  <text class="small" x="1270" y="622">drafts, generated outputs, receipts</text>

  <rect class="panel" x="60" y="785" width="1480" height="80"/>
  <text class="section" x="90" y="825">Core loop</text>
  <text class="small" x="235" y="825">Capture → Structure → Validate → Coordinate → Execute → Distill → Repeat</text>

  <rect class="input" x="430" y="788" width="230" height="58"/>
  <text class="small" x="458" y="823">Relay / Connectors / Links</text>
  <rect class="input" x="690" y="788" width="230" height="58"/>
  <text class="small" x="736" y="823">Portable Packets / Adapters</text>
  <rect class="input" x="950" y="788" width="190" height="58"/>
  <text class="small" x="985" y="823">Write-through</text>

  <path class="arrow" d="M330 274 C420 274, 470 274, 705 282"/>
  <path class="arrow" d="M790 340 L790 385"/>
  <path class="arrow" d="M790 505 L790 565"/>
  <path class="arrow" d="M945 445 C1040 445, 1095 445, 1240 447"/>
  <path class="arrow" d="M1095 628 C1160 628, 1200 628, 1240 605"/>
  <path class="softarrow" d="M330 398 C470 398, 520 398, 635 440"/>
  <path class="softarrow" d="M330 525 C500 525, 535 525, 485 618"/>
  <path class="softarrow dashed" d="M330 668 C470 668, 530 668, 640 505"/>
  <path class="softarrow dashed" d="M1375 680 C1375 740, 1170 820, 1140 820"/>
  <path class="softarrow dashed" d="M545 846 C450 846, 360 760, 240 720"/>

  <text class="tiny" x="690" y="365">default operating kernel</text>
  <text class="tiny" x="1110" y="608">execution routed by risk</text>
  <text class="tiny" x="1030" y="828">promotion, validation, receipts</text>

  <text class="tiny" x="122" y="747">Theo can shape preference loops and strategy, but does not become storage.</text>
  <text class="tiny" x="478" y="718">Node copy = coordination artifact. Floor copy = execution artifact.</text>
</svg>
